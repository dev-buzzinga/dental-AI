### 2. **WebSocket Connection**

```javascript
const connectWebSocket = (newVoiceNoteId) => {
  return new Promise((resolve, reject) => {
    if (!newVoiceNoteId) {
      console.error('❌ No voiceNoteId available');
      reject('No voiceNoteId');
      return;
    }

    // Replace with your backend URL
    const wsUrl = `wss://your-backend-url.com/ws/transcribe?voiceNoteId=${newVoiceNoteId}`;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      console.log('✅ WebSocket connected');
      setIsConnected(true);
      setWsConnection(ws);
      resolve(ws);
    };

    ws.onerror = (error) => {
      console.error('❌ WebSocket error:', error);
      reject(error);
    };

    ws.onclose = () => {
      console.log('🔌 WebSocket closed');
      setIsConnected(false);
    };

    // Handle incoming transcript messages
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'transcript') {
          // Append new transcript text
          setLiveTranscript(prev => prev + ' ' + data.text);
        }
      } catch (err) {
        console.error('❌ Error parsing ws message:', err);
      }
    };
  });
};

const disconnectWebSocket = () => {
  if (wsConnection) {
    wsConnection.close();
    setWsConnection(null);
    setIsConnected(false);
  }
};
```

### 3. **Audio Recording**

```javascript
const startRecording = async () => {
  let newVoiceNoteId = voiceNoteId;

  // Save voice note metadata first if not saved
  if (!voiceNoteId) {
    setIsRecordingLoading(true);
    newVoiceNoteId = await handleSaveVoiceNote();
  }

  if (!newVoiceNoteId) return;

  setVoiceNoteId(newVoiceNoteId);

  try {
    // Step 1: Connect WebSocket for live transcription
    const ws = await connectWebSocket(newVoiceNoteId);
    setIsRecordingLoading(false);

    // Step 2: Get microphone access
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream, {
      mimeType: 'audio/webm;codecs=opus'
    });

    const chunks = [];

    // Step 3: On each audio chunk, send to server via WebSocket
    recorder.ondataavailable = async (event) => {
      if (event.data.size > 0) {
        chunks.push(event.data);
        
        // Send audio data to WebSocket for transcription
        if (ws.readyState === WebSocket.OPEN) {
          try {
            const arrayBuffer = await event.data.arrayBuffer();
            // Convert to base64
            const base64Data = btoa(
              String.fromCharCode(...new Uint8Array(arrayBuffer))
            );

            // Send to server
            ws.send(JSON.stringify({
              type: 'audio',
              data: base64Data
            }));
          } catch (error) {
            console.error('Error sending audio data:', error);
          }
        }
      }
    };

    // Step 4: When recording stops
    recorder.onstop = () => {
      const audioBlob = new Blob(chunks, { type: 'audio/webm' });
      setAudioChunks(chunks);
      
      // Generate AI summary with the complete transcript
      if (shouldUploadOnStopRef.current) {
        generateAISummary(liveTranscriptRef.current, newVoiceNoteId);
      }
    };

    // Step 5: Start recording
    recorder.start(1000); // Capture data every 1 second
    setMediaRecorder(recorder);
    setIsRecording(true);
    setRecordingTime(0);

    // Timer for recording duration
    recordingIntervalRef.current = setInterval(() => {
      setRecordingTime(prev => prev + 1);
    }, 1000);

  } catch (error) {
    console.error('Error starting recording:', error);
    setApiErrorMessage('Failed to start recording. Check microphone permissions.');
    setShowApiError(true);
  }
};

const pauseRecording = () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.pause();
    setIsPaused(true);
    clearInterval(recordingIntervalRef.current);
  }
};

const resumeRecording = () => {
  if (mediaRecorder && mediaRecorder.state === 'paused') {
    mediaRecorder.resume();
    setIsPaused(false);
    recordingIntervalRef.current = setInterval(() => {
      setRecordingTime(prev => prev + 1);
    }, 1000);
  }
};

const stopRecording = () => {
  if (mediaRecorder) {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
    setDuration(recordingTime);
    setIsRecording(false);
    setIsPaused(false);
    clearInterval(recordingIntervalRef.current);
    disconnectWebSocket();
  }
};
```

### 4. **Upload Audio & Generate Summary**

