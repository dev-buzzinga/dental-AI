## 🔄 WebSocket Communication Flow

### Frontend → Backend → Deepgram → Frontend

**Step 1: Connect**
```javascript
WebSocket Connect: wss://server/ws/transcribe?voiceNoteId=123
```

**Step 2: Send Audio**
```json
{
  "type": "audio",
  "data": "base64_encoded_audio_chunk"
}
```

**Step 3: Receive Transcript**
```json
{
  "type": "transcript",
  "text": "What is the patient's medical history",
  "is_final": false
}
```

**Step 4: Final Transcript**
```json
{
  "type": "transcript",
  "text": ".",
  "is_final": true
}
```

**Step 5: Stop Recording**
```json
{
  "type": "stop"
}
```

