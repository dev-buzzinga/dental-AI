    setApiErrorMessage('Failed to upload audio');
    setShowApiError(true);
  } finally {
    setIsUploadingAudio(false);
  }
};

// Auto-upload when recording stops
useEffect(() => {
  if (!isRecording && audioChunks.length > 0 && shouldUploadOnStopRef.current) {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    setAudioBlob(blob);
    uploadAudioToBackend(blob);
  }
}, [isRecording, audioChunks]);
