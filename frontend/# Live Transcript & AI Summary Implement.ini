## 📊 Database Schema

### ai_scribes Table
```sql
CREATE TABLE ai_scribes (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  clinic_id UUID NOT NULL REFERENCES clinics(id),
  patient_id UUID NOT NULL REFERENCES patients(id),
  doctor_id UUID NOT NULL REFERENCES doctors(id),
  template_id UUID REFERENCES scribe_templates(id),
  
  -- User inputs
  description TEXT,
  date_created DATE,
  
  -- Recording data
  user_recording_url TEXT,
  duration_seconds INTEGER,
  
  -- Transcription data
  transcript_url TEXT,
  live_transcript TEXT,
  
  -- AI Summary data
  ai_summary_url TEXT,
  ai_summary TEXT,
  
  -- Metadata
  created_at TIMESTAMP DEFAULT NOW(),
  updated_at TIMESTAMP DEFAULT NOW()
);
```

### scribe_templates Table
```sql
CREATE TABLE scribe_templates (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  clinic_id UUID NOT NULL REFERENCES clinics(id),
  
  name VARCHAR(255) NOT NULL,
  content TEXT NOT NULL,
  is_default BOOLEAN DEFAULT FALSE,
  
  created_at TIMESTAMP DEFAULT NOW(),
  updated_at TIMESTAMP DEFAULT NOW(),
  
  UNIQUE(clinic_id, name)
);
```

### Storage Buckets (Supabase)
```
- audio/                  (for audio recordings)
- transcripts/            (for transcripts and summaries)
```

