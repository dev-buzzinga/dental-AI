const generateAISummary = async (transcript, newVoiceNoteId) => {
  const voiceNoteId = newVoiceNoteId || voiceNoteId;

  if (!voiceNoteId || !transcript) {
    setIsGeneratingSummary(false);
    return;
  }

  setIsGeneratingSummary(true);

  const patient = patients.find(p => p.id === selectedPatient);
  const doctor = doctors.find(d => d.id === selectedDoctor);

  // Prepare payload for API
  const payload = {
    transcript,  // Complete transcript from WebSocket
    patient_name: patient ? patient.name : '',
    doctor_name: doctor ? doctor.name : '',
    template: description  // User-selected template
  };

  try {
    // Call backend API to generate summary
    const response = await generateAISummaryService(voiceNoteId, payload);

    if (response.data && response.data.ai_summary) {
      setAiSummary(response.data.ai_summary);
    }
  } catch (error) {
    console.error('Failed to generate AI summary:', error);
    setApiErrorMessage('Failed to generate AI summary. Try again.');
    setShowApiError(true);
  } finally {
    setIsGeneratingSummary(false);
  }
};
