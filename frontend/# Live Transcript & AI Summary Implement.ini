## 🔙 Backend Implementation

### 1. **WebSocket Server Setup**

```javascript
// server.js or app.js
import express from 'express';
import WebSocket, { WebSocketServer } from 'ws';
import http from 'http';
import { createClient } from '@deepgram/sdk';

const app = express();
const server = http.createServer(app);

const deepgramApiKey = process.env.DEEPGRAM_API_KEY;
const deepgram = createClient(deepgramApiKey);

// Create WebSocket server
const wss = new WebSocketServer({ server, path: '/ws/transcribe' });

wss.on('connection', async (clientWs, req) => {
  console.log('📞 New WebSocket connection');
  
  // Extract voiceNoteId from query params
  const url = new URL(req.url, `http://${req.headers.host}`);
  const voiceNoteId = url.searchParams.get('voiceNoteId');

  if (!voiceNoteId) {
    clientWs.close(1008, 'Missing voiceNoteId');
    return;
  }

  // Create connection to Deepgram for real-time transcription
  const deepgramWs = new WebSocket(
    `wss://api.deepgram.com/v1/listen?encoding=linear16&sample_rate=8000&channels=1`,
    {
      headers: {
        Authorization: `Token ${deepgramApiKey}`,
      },
    }
  );

  let audioBufferQueue = [];

  // Deepgram connection established
  deepgramWs.on('open', () => {
    console.log('🔌 Connected to Deepgram');
  });

  // Handle transcription responses from Deepgram
  deepgramWs.on('message', (message) => {
    try {
      const data = JSON.parse(message);
      const transcript = data.channel?.alternatives?.[0]?.transcript;

      if (transcript && data.is_final) {
        console.log('🎤 Final transcript:', transcript);
        
        // Send transcript back to client
        clientWs.send(JSON.stringify({
          type: 'transcript',
          text: transcript,
          is_final: true
        }));
      } else if (transcript) {
        // Send partial transcript
        clientWs.send(JSON.stringify({
          type: 'transcript',
          text: transcript,
          is_final: false
        }));
      }
    } catch (err) {
      console.error('Error parsing Deepgram response:', err);
    }
  });

  deepgramWs.on('error', (err) => {
    console.error('❌ Deepgram WebSocket error:', err);
    clientWs.send(JSON.stringify({
      type: 'error',
      message: 'Transcription service error'
    }));
  });

  // Handle client messages
  clientWs.on('message', (msg) => {
    try {
      const data = JSON.parse(msg);

      if (data.type === 'audio') {
        // Decode base64 audio and send to Deepgram
        const audioBuffer = Buffer.from(data.data, 'base64');
        audioBufferQueue.push(audioBuffer);

        // Send batched audio to Deepgram
        if (audioBufferQueue.length >= 20) {
          const mergedBuffer = Buffer.concat(audioBufferQueue);
          if (deepgramWs.readyState === WebSocket.OPEN) {
            deepgramWs.send(mergedBuffer);
            console.log('🎙️ Sent audio batch to Deepgram');
          }
          audioBufferQueue = [];
        }
      }

      if (data.type === 'stop') {
        console.log('🛑 Recording stopped');
        
        // Flush remaining audio
        if (audioBufferQueue.length > 0 && deepgramWs.readyState === WebSocket.OPEN) {
          const remainingBuffer = Buffer.concat(audioBufferQueue);
          deepgramWs.send(remainingBuffer);
          audioBufferQueue = [];
        }

        // Close Deepgram connection
        if (deepgramWs.readyState === WebSocket.OPEN) {
          deepgramWs.close();
        }
      }
    } catch (err) {
      console.error('Error processing client message:', err);
    }
  });

  // Handle client disconnect
  clientWs.on('close', () => {
    console.log('❌ Client disconnected');
    
    if (deepgramWs.readyState === WebSocket.OPEN) {
      deepgramWs.close();
    }
  });
});

const PORT = process.env.PORT || 3000;
server.listen(PORT, () => {
  console.log(`🚀 Server running on port ${PORT}`);
});
```

### 2. **AI Scribe Controller**

```javascript
// controllers/ai-scribe.controller.js

export const generateScribeSummary = async (req, res) => {
  try {
    const { id } = req.params;
    const { transcript, patient_name, doctor_name, template } = req.body;

    if (!transcript) {
      return res.status(400).json({ error: 'Transcript is required' });
    }

    console.log('Generating summary for scribe:', id);

    // 1. Store transcript in Supabase Storage
    const transcriptFilename = `transcript_${id}_${Date.now()}.txt`;
    const transcriptUrl = await AiScribeService.uploadTranscriptToSupabase(
      transcript,
      transcriptFilename
    );

    // 2. Update scribe with transcript
    await AiScribeService.updateScribeTranscript(id, transcript, transcriptUrl);

    // 3. Prepare payload for AI service
    const payload = {
      transcript,
      patient_name: patient_name || '',
      doctor_name: doctor_name || '',
      template: template || ''
    };

    // 4. Call AI service to generate summary
    const aiSummary = await AiScribeService.generateAISummary(payload);

    // 5. Store summary and update scribe
    const updatedScribe = await AiScribeService.updateScribeSummary(id, aiSummary);

    res.json({
      message: 'Summary generated successfully',
      data: {
        transcript_url: transcriptUrl,
        ai_summary: aiSummary,
        scribe: updatedScribe
      }
    });

  } catch (error) {
    console.error('Generate summary error:', error);
    res.status(500).json({ error: 'Failed to generate summary' });
  }
};

export const uploadScribeAudio = async (req, res) => {
  try {
    const scribeId = req.params.id;

    if (!req.files || !req.files.audio) {
      return res.status(400).json({ error: 'No audio file uploaded' });
    }

    const audioFile = req.files.audio;
    const filename = `scribe_${scribeId}_${Date.now()}_${audioFile.name}`;
    const duration = parseInt(req.body.duration || 0);

    // Upload to Supabase Storage
    const publicUrl = await AiScribeService.uploadAudioToSupabase(
      audioFile.data,
      filename,
      audioFile.mimetype
    );

    // Update database with audio URL
    await AiScribeService.updateScribeAudioUrl(scribeId, publicUrl, duration);

    res.json({ url: publicUrl });

  } catch (error) {
    console.error('Error uploading scribe audio:', error);
    res.status(500).json({ error: 'Failed to upload audio' });
  }
};
```

### 3. **AI Scribe Service**

```javascript
// services/ai-scribe.service.js

class AiScribeService {
  
  // Upload transcript to Supabase Storage
  static async uploadTranscriptToSupabase(transcript, filename) {
    const { data, error } = await supabase.storage
      .from('transcripts')
      .upload(filename, transcript, {
        contentType: 'text/plain',
        upsert: false,
      });

    if (error) throw error;

    const { data: publicUrlData } = supabase.storage
      .from('transcripts')
      .getPublicUrl(filename);

    return publicUrlData.publicUrl;
  }

  // Update scribe with transcript data
  static async updateScribeTranscript(scribeId, transcript, transcriptUrl) {
    const { data, error } = await supabase
      .from('ai_scribes')
      .update({
        transcript_url: transcriptUrl,
        updated_at: new Date().toISOString()
      })
      .eq('id', scribeId)
      .select()
      .single();

    if (error) throw error;
    return data;
  }

  // Generate AI summary using Claude/OpenAI API
  static async generateAISummary(payload) {
    try {
      // Call external AI service (Claude/OpenAI)
      const response = await fetch(`${process.env.AI_SERVER}/api-bot/aisummary`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          transcript: payload.transcript,
          patient_name: payload.patient_name,
          doctor_name: payload.doctor_name,
          template: payload.template,
          context: 'dental_medical_notes'
        })
      });

      if (!response.ok) {
        throw new Error(`AI service error: ${response.status}`);
      }

      const result = await response.json();
      return result.summary || 'Summary generation failed';

    } catch (error) {
      console.error('AI summary generation error:', error);
      // Fallback summary
      return `Summary based on transcript: ${payload.transcript.substring(0, 200)}...`;
    }
  }

  // Store summary in Supabase
  static async updateScribeSummary(scribeId, summary) {
    const summaryFilename = `summary_${scribeId}_${Date.now()}.txt`;

    // Upload to storage
    const { data: uploadData, error: uploadError } = await supabase.storage
      .from('transcripts')
      .upload(summaryFilename, summary, {
        contentType: 'text/plain',
        upsert: false,
      });

    if (uploadError) throw uploadError;

    const { data: publicUrlData } = supabase.storage
      .from('transcripts')
      .getPublicUrl(summaryFilename);

    // Update database
    const { data, error } = await supabase
      .from('ai_scribes')
      .update({
        ai_summary_url: publicUrlData.publicUrl,
        updated_at: new Date().toISOString()
      })
      .eq('id', scribeId)
      .select()
      .single();

    if (error) throw error;
    return data;
  }

  // Upload audio to Supabase
  static async uploadAudioToSupabase(buffer, filename, contentType = 'audio/webm') {
    const { data, error } = await supabase.storage
      .from('audio')
      .upload(filename, buffer, {
        contentType,
        upsert: false,
      });

    if (error) throw error;

    const { data: publicUrlData } = supabase.storage
      .from('audio')
      .getPublicUrl(filename);

    return publicUrlData.publicUrl;
  }

  static async updateScribeAudioUrl(scribeId, url, duration) {
    const { data, error } = await supabase
      .from('ai_scribes')
      .update({
        user_recording_url: url,
        duration_seconds: duration,
        updated_at: new Date().toISOString()
      })
      .eq('id', scribeId)
      .select()
      .single();

    if (error) throw error;
    return data;
  }
}

export default AiScribeService;
```

