## 🏗️ Architecture Overview

### System Flow Diagram
```
┌─────────────────┐
│   User (Browser)│
└────────┬────────┘
         │ Start Recording
         ↓
┌─────────────────────────────────────┐
│  Browser Audio Recording (WebAPI)   │
│  - navigator.mediaDevices.getUserMedia()
│  - MediaRecorder API
└────────┬────────────────────────────┘
         │ Real-time audio chunks
         ↓ (WebSocket)
┌─────────────────────────────────────┐
│  Frontend WebSocket Client          │
│  wss://server/ws/transcribe         │
└────────┬────────────────────────────┘
         │ Base64 encoded audio
         ↓
┌─────────────────────────────────────┐
│  Backend WebSocket Server           │
│  - Node.js + ws library             │
└────────┬────────────────────────────┘
         │ Forwards audio
         ↓
┌─────────────────────────────────────┐
│  Deepgram Speech-to-Text API        │
│  Real-time transcription service    │
└────────┬────────────────────────────┘
         │ Transcript text
         ↓
┌─────────────────────────────────────┐
│  Backend WebSocket (to Client)      │
│  { type: "transcript", text: "..." }│
└────────┬────────────────────────────┘
         │
         ↓
┌─────────────────────────────────────┐
│  Frontend Live Transcript Display    │
│  Real-time updating state            │
└─────────────────────────────────────┘

[When Recording Stops]
         ↓
┌─────────────────────────────────────┐
│  Call AI Summary Generation API      │
│  POST /api/ai-scribe/:id/summarize  │
└────────┬────────────────────────────┘
         │ Payload: transcript + metadata
         ↓
┌─────────────────────────────────────┐
│  Backend: Generate Summary            │
│  - Store transcript in Supabase      │
│  - Call Claude AI service             │
│  - Return formatted summary           │
└────────┬────────────────────────────┘
         │ Summary response
         ↓
┌─────────────────────────────────────┐
│  Frontend AI Summary Display          │
│  Update state with summary           │
└─────────────────────────────────────┘
```

