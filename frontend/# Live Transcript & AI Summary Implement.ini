## 🎯 Key Implementation Points

### 1. **Real-time Transcript Updates**
- Use `useRef` to store latest transcript value
- Update state separately for UI rendering
- Append new transcript chunks to existing text

### 2. **WebSocket Best Practices**
- Always check connection state before sending
- Implement proper error handling and reconnection logic
- Use batching for audio chunks for efficiency

### 3. **Audio Processing**
- Use `MediaRecorder` API for browser recording
- Convert audio to base64 for WebSocket transmission
- Handle different audio formats (webm, wav, etc.)

### 4. **AI Summary Generation**
- Call after recording stops with complete transcript
- Send patient/doctor metadata for context
- Use template structure for consistent formatting

### 5. **Storage & Retrieval**
- Store transcripts and summaries as files in Supabase
- Keep URLs in database for easy access
- Implement cleanup for deleted recordings

