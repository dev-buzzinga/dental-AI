## 🐛 Common Issues & Solutions

### Issue: WebSocket Connection Fails
**Solution:** Check CORS headers, verify WebSocket path, confirm SSL/TLS certificates

### Issue: Transcript Not Updating in Real-time
**Solution:** Ensure `liveTranscriptRef` is properly updated, check message parsing

### Issue: Audio Upload Fails
**Solution:** Verify file size limits, check MIME type, ensure Supabase credentials

### Issue: AI Summary Generation Slow
**Solution:** Use async processing, implement queue system, cache common summaries

